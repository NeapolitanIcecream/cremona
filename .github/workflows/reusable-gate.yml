name: Cremona Reusable Gate

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used to run the workflow
        required: false
        type: string
        default: "3.12"
      working-directory:
        description: Repository directory where setup, tests, and scan commands run
        required: false
        type: string
        default: "."
      setup-command:
        description: Command that prepares the target repository before tests and scan
        required: false
        type: string
        default: "uv sync --group dev"
      test-command:
        description: Command that generates coverage data before the Cremona scan
        required: false
        type: string
        default: "uv run coverage run -m pytest -q"
      coverage-json-command:
        description: Command that writes a coverage.py JSON export
        required: false
        type: string
        default: "uv run coverage json -o coverage.json"
      coverage-json-path:
        description: Path to the coverage JSON file relative to working-directory
        required: false
        type: string
        default: "coverage.json"
      baseline-path:
        description: Path to the committed baseline file relative to working-directory
        required: false
        type: string
        default: "quality/refactor-baseline.json"
      out-dir:
        description: Output directory for the Markdown, JSON, and raw reports
        required: false
        type: string
        default: "output/refactor-audit"
      extra-scan-args:
        description: Extra arguments forwarded to `cremona scan`
        required: false
        type: string
        default: ""
      fail-on-regression:
        description: Whether the workflow should fail on structural regressions
        required: false
        type: boolean
        default: true
      upload-artifact:
        description: Whether to upload the Cremona report directory as an artifact
        required: false
        type: boolean
        default: true
      comment-on-pr:
        description: Whether to publish a sticky PR comment on same-repository pull requests
        required: false
        type: boolean
        default: false
      artifact-name:
        description: Artifact name used when upload-artifact is enabled
        required: false
        type: string
        default: "cremona-report"
      max-comment-rows:
        description: Maximum routing rows included in the sticky PR comment
        required: false
        type: number
        default: 5
      max-hotspots:
        description: Maximum hotspots included in the sticky PR comment
        required: false
        type: number
        default: 3

jobs:
  cremona:
    name: cremona
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v7
      - name: Setup repository
        if: ${{ inputs.setup-command != '' }}
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.setup-command }}
      - name: Run tests
        if: ${{ inputs.test-command != '' }}
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}
      - name: Export coverage JSON
        if: ${{ inputs.coverage-json-command != '' }}
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.coverage-json-command }}
      - name: Run Cremona
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          CREMONA_BASELINE_PATH: ${{ inputs.baseline-path }}
          CREMONA_COVERAGE_JSON_PATH: ${{ inputs.coverage-json-path }}
          CREMONA_OUT_DIR: ${{ inputs.out-dir }}
          CREMONA_EXTRA_SCAN_ARGS: ${{ inputs.extra-scan-args }}
          CREMONA_FAIL_ON_REGRESSION: ${{ inputs.fail-on-regression }}
        run: |
          python - <<'PY'
          import os
          import shlex
          import subprocess

          cmd = [
              "uvx",
              "cremona",
              "scan",
              "--out-dir",
              os.environ["CREMONA_OUT_DIR"],
              "--baseline",
              os.environ["CREMONA_BASELINE_PATH"],
          ]
          coverage_path = os.environ["CREMONA_COVERAGE_JSON_PATH"].strip()
          if coverage_path:
              cmd.extend(["--coverage-json", coverage_path])
          if os.environ["CREMONA_FAIL_ON_REGRESSION"] == "true":
              cmd.append("--fail-on-regression")
          cmd.extend(shlex.split(os.environ["CREMONA_EXTRA_SCAN_ARGS"]))
          subprocess.run(cmd, check=True)
          PY
      - name: Write Cremona summary
        if: always()
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          CREMONA_OUT_DIR: ${{ inputs.out-dir }}
          CREMONA_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          report_path = Path(os.environ["CREMONA_OUT_DIR"]) / "report.md"
          if not report_path.exists():
              summary_path.write_text(
                  "## Cremona report\n\nNo report was produced.\n",
                  encoding="utf-8",
              )
              raise SystemExit(0)

          sections: dict[str, list[str]] = {}
          current: str | None = None
          for line in report_path.read_text(encoding="utf-8").splitlines():
              if line.startswith("## "):
                  current = line[3:]
                  sections[current] = []
                  continue
              if current is not None:
                  sections[current].append(line)

          verdict = "\n".join(sections.get("Repo verdict", [])).strip()
          queue_lines = sections.get("Agent routing queue", [])
          queue_excerpt: list[str] = []
          row_count = 0
          for line in queue_lines:
              if line.startswith("- History status") or line.startswith("- Lookback days"):
                  queue_excerpt.append(line)
                  continue
              if line.startswith("|"):
                  queue_excerpt.append(line)
                  if line.startswith("| `") or line.startswith("| watch") or line.startswith("| investigate"):
                      row_count += 1
                      if row_count >= 5:
                          break

          lines = [
              "## Cremona report",
              "",
              verdict,
              "",
              "### Top routing rows",
              "",
              *queue_excerpt,
              "",
              (
                  "Full Markdown and JSON reports are attached as the "
                  f"`{os.environ['CREMONA_ARTIFACT_NAME']}` artifact when artifact upload is enabled."
              ),
              "",
          ]
          summary_path.write_text("\n".join(lines), encoding="utf-8")
          PY
      - uses: actions/upload-artifact@v7
        if: ${{ always() && inputs.upload-artifact }}
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/${{ inputs.out-dir }}
          if-no-files-found: warn
      - name: Resolve Cremona workflow source
        id: cremona-workflow-source
        if: ${{ always() && inputs.comment-on-pr && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        env:
          CREMONA_GITHUB_API_URL: ${{ github.api_url }}
          CREMONA_GITHUB_REPOSITORY: ${{ github.repository }}
          CREMONA_GITHUB_RUN_ID: ${{ github.run_id }}
          CREMONA_GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import os
          import urllib.error
          import urllib.request

          api_url = (
              f"{os.environ['CREMONA_GITHUB_API_URL']}"
              f"/repos/{os.environ['CREMONA_GITHUB_REPOSITORY']}"
              f"/actions/runs/{os.environ['CREMONA_GITHUB_RUN_ID']}"
          )
          request = urllib.request.Request(
              api_url,
              headers={
                  "Authorization": f"Bearer {os.environ['CREMONA_GITHUB_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(request) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code == 403:
                  raise SystemExit(
                      "GitHub token lacks Actions read permission for workflow source "
                      "lookup. Callers enabling comment-on-pr must grant both "
                      "actions: read and pull-requests: write."
                  ) from exc
              raise

          referenced_workflows = payload.get("referenced_workflows", [])
          if not referenced_workflows:
              raise SystemExit("No referenced workflow metadata was found for this run.")

          workflow_path_suffix = "/.github/workflows/reusable-gate.yml@"
          workflow_ref = next(
              (
                  item
                  for item in referenced_workflows
                  if workflow_path_suffix in str(item.get("path", ""))
              ),
              None,
          )
          if workflow_ref is None:
              raise SystemExit(
                  "Could not find reusable-gate.yml in referenced workflow metadata."
              )

          workflow_path = str(workflow_ref["path"])
          repository = workflow_path.split("/.github/workflows/", 1)[0]
          sha = str(workflow_ref["sha"])

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          output_path.write_text(
              f"repository={repository}\nsha={sha}\n",
              encoding="utf-8",
          )
          PY
      - name: Checkout Cremona workflow source
        if: ${{ always() && inputs.comment-on-pr && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.cremona-workflow-source.outputs.repository }}
          ref: ${{ steps.cremona-workflow-source.outputs.sha }}
          path: .cremona-workflow-source
          fetch-depth: 1
      - name: Render Cremona PR comment
        if: ${{ always() && inputs.comment-on-pr && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          CREMONA_ARTIFACT_NAME: ${{ inputs.artifact-name }}
          CREMONA_MAX_COMMENT_ROWS: ${{ inputs.max-comment-rows }}
          CREMONA_MAX_HOTSPOTS: ${{ inputs.max-hotspots }}
          CREMONA_PR_COMMENT_PATH: ${{ runner.temp }}/cremona-pr-comment.md
          CREMONA_REPORT_JSON: ${{ inputs.out-dir }}/report.json
          CREMONA_RENDERER_SOURCE: ${{ github.workspace }}/.cremona-workflow-source
          CREMONA_UPLOAD_ARTIFACT: ${{ inputs.upload-artifact }}
        run: |
          artifact_flag="--no-artifact-enabled"
          if [ "${CREMONA_UPLOAD_ARTIFACT}" = "true" ]; then
            artifact_flag="--artifact-enabled"
          fi

          uv run --isolated --no-project --with-editable "${CREMONA_RENDERER_SOURCE}" -m cremona.pr_comment \
            --report-json "${CREMONA_REPORT_JSON}" \
            --max-comment-rows "${CREMONA_MAX_COMMENT_ROWS}" \
            --max-hotspots "${CREMONA_MAX_HOTSPOTS}" \
            --artifact-name "${CREMONA_ARTIFACT_NAME}" \
            "${artifact_flag}" \
            > "${CREMONA_PR_COMMENT_PATH}"
      - name: Update Cremona PR comment
        if: ${{ always() && inputs.comment-on-pr && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v9
        env:
          CREMONA_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CREMONA_PR_COMMENT_PATH: ${{ runner.temp }}/cremona-pr-comment.md
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("node:fs")

            const marker = "<!-- cremona-report -->"
            const botLogin = "github-actions[bot]"
            const body = fs.readFileSync(process.env.CREMONA_PR_COMMENT_PATH, "utf8")
            const expectedHeadSha = process.env.CREMONA_PR_HEAD_SHA

            const pullRequest = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            })
            const currentHeadSha = pullRequest.data.head.sha

            if (currentHeadSha !== expectedHeadSha) {
              core.info(
                `Skipping stale Cremona comment update for ${expectedHeadSha}; current PR head is ${currentHeadSha}.`
              )
              return
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.login === botLogin && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
              core.info(`Updated Cremona comment ${existing.id}`)
              return
            }

            const created = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
            core.info(`Created Cremona comment ${created.data.id}`)
