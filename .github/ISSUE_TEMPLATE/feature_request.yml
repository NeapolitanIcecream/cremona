name: Feature request
description: Propose a new capability, integration, or docs improvement
title: "[feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem first. Then describe the workflow or output you want Cremona to support.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What task is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the command, config, report field, or docs addition you want
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What do you do today instead?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add report excerpts, example repos, or CI snippets if useful
